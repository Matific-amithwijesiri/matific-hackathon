<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-page app-page--login" data-page="login">
  <div class="container py-5">

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4 app-login-card">
      <div class="text-center mb-4">
        <h2 id="loginWelcomeHeading" class="brand-title" data-testid="login-welcome-heading" data-gtm-id="login_welcome">Welcome Back</h2>
        <p class="text-muted mb-0 app-login-tagline" data-testid="login-tagline">Login to access the dashboard</p>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          id="email"
          name="email"
          type="email"
          class="form-control app-input-login-email"
          placeholder="demo@example.com"
          data-testid="login-email"
          data-gtm-id="login_field_email"
          autocomplete="username"
        />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          class="form-control app-input-login-password"
          placeholder="123456"
          data-testid="login-password"
          data-gtm-id="login_field_password"
          autocomplete="current-password"
        />
      </div>

      <div id="loginError" class="alert alert-danger d-none app-login-error" role="alert" data-testid="login-error" data-gtm-id="login_error"></div>

      <button
        id="loginButton"
        type="button"
        class="btn btn-primary w-100 app-btn-login"
        data-testid="login-submit"
        data-gtm-id="login_submit"
        onclick="login()"
      >Login</button>

      <div class="mt-3 small text-muted text-center app-login-demo-hint" data-testid="login-demo-hint" data-gtm-id="login_demo_hint">
        Demo: demo@example.com / 123456
      </div>
    </div>
  </div>
</div>

  </div>
  <script src="app.js"></script>
</body>
</html>
