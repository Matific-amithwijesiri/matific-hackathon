<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-page app-page--contact-form" data-page="contact-form">
  <div class="container py-5">

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card bg-white p-4 app-contact-form-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="contactFormTitle" class="mb-0" data-testid="contact-form-title" data-gtm-id="contact_form_title">Contact Form</h3>
        <a
          href="dashboard.html"
          class="btn btn-outline-secondary app-link-back-dashboard"
          data-testid="contact-back-dashboard"
          data-gtm-id="contact_back_dashboard"
        >Back to Dashboard</a>
      </div>

      <form id="contactForm" name="contact" class="app-form-contact" onsubmit="submitContactForm(event)">
        <div class="mb-3">
          <label for="contactName" class="form-label">Name</label>
          <input
            id="contactName"
            name="contact_name"
            type="text"
            class="form-control app-input-contact-name"
            data-testid="contact-name"
            data-gtm-id="contact_field_name"
          />
        </div>
        <div class="mb-3">
          <label for="contactEmail" class="form-label">Email</label>
          <input
            id="contactEmail"
            name="contact_email"
            type="email"
            class="form-control app-input-contact-email"
            data-testid="contact-email"
            data-gtm-id="contact_field_email"
          />
        </div>
        <div class="mb-3">
          <label for="contactMessage" class="form-label">Message</label>
          <textarea
            id="contactMessage"
            name="contact_message"
            class="form-control app-input-contact-message"
            rows="4"
            data-testid="contact-message"
            data-gtm-id="contact_field_message"
          ></textarea>
        </div>
        <button
          id="contactSubmit"
          type="submit"
          class="btn btn-success app-btn-contact-submit"
          data-testid="contact-submit"
          data-gtm-id="contact_submit"
        >Submit</button>
      </form>

      <div
        id="contactSuccess"
        class="alert alert-success mt-3 success-message app-contact-success"
        role="alert"
        data-testid="contact-success"
        data-gtm-id="contact_success_message"
      ></div>
    </div>
  </div>
</div>

  </div>
  <script src="app.js"></script>
</body>
</html>
