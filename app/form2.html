<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-page app-page--registration-form" data-page="registration-form">
  <div class="container py-5">

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card bg-white p-4 app-registration-form-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="registrationFormTitle" class="mb-0" data-testid="registration-form-title" data-gtm-id="registration_form_title">Registration Form</h3>
        <a
          href="dashboard.html"
          class="btn btn-outline-secondary app-link-back-dashboard"
          data-testid="registration-back-dashboard"
          data-gtm-id="registration_back_dashboard"
        >Back to Dashboard</a>
      </div>

      <form id="registrationForm" name="registration" class="app-form-registration" onsubmit="submitRegistrationForm(event)">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            id="username"
            name="username"
            type="text"
            class="form-control app-input-registration-username"
            data-testid="registration-username"
            data-gtm-id="registration_field_username"
            autocomplete="username"
          />
        </div>
        <div class="mb-3">
          <label for="registerPassword" class="form-label">Password</label>
          <input
            id="registerPassword"
            name="registration_password"
            type="password"
            class="form-control app-input-registration-password"
            data-testid="registration-password"
            data-gtm-id="registration_field_password"
            autocomplete="new-password"
          />
        </div>
        <div class="mb-3">
          <label for="role" class="form-label">Role</label>
          <select
            id="role"
            name="role"
            class="form-select app-select-registration-role"
            data-testid="registration-role"
            data-gtm-id="registration_field_role"
          >
            <option value="">Select role</option>
            <option value="User">User</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <button
          id="registrationSubmit"
          type="submit"
          class="btn btn-primary app-btn-registration-submit"
          data-testid="registration-submit"
          data-gtm-id="registration_submit"
        >Register</button>
      </form>

      <div
        id="registrationSuccess"
        class="alert alert-success mt-3 success-message app-registration-success"
        role="alert"
        data-testid="registration-success"
        data-gtm-id="registration_success_message"
      ></div>
    </div>
  </div>
</div>

  </div>
  <script src="app.js"></script>
</body>
</html>
