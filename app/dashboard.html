<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-page app-page--dashboard" data-page="dashboard">
  <div class="container py-5">

<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card p-4 app-dashboard-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h2 id="dashboardTitle" class="brand-title mb-1" data-testid="dashboard-title" data-gtm-id="dashboard_title">Dashboard</h2>
          <p class="text-muted mb-0 app-dashboard-subtitle" data-testid="dashboard-subtitle" data-gtm-id="dashboard_subtitle">Select a form to automate</p>
        </div>
        <button
          id="logoutButton"
          type="button"
          class="btn btn-outline-danger app-btn-logout"
          data-testid="logout-button"
          data-gtm-id="logout_click"
          onclick="logout()"
        >Logout</button>
      </div>

      <div class="list-group app-dashboard-nav">
        <a
          class="nav-link-card app-nav-contact"
          href="forms.html"
          data-testid="dashboard-nav-contact"
          data-gtm-id="nav_contact_form"
        >
          <div class="list-group-item p-3">
            <h5 class="mb-1">Contact Form</h5>
            <small class="text-muted" data-testid="dashboard-card-contact-desc">Name, email, and message</small>
          </div>
        </a>
        <a
          class="nav-link-card app-nav-registration"
          href="form2.html"
          data-testid="dashboard-nav-registration"
          data-gtm-id="nav_registration_form"
        >
          <div class="list-group-item p-3">
            <h5 class="mb-1">Registration Form</h5>
            <small class="text-muted" data-testid="dashboard-card-registration-desc">Username, password, and role</small>
          </div>
        </a>
        <a
          class="nav-link-card app-nav-feedback"
          href="form3.html"
          data-testid="dashboard-nav-feedback"
          data-gtm-id="nav_feedback_form"
        >
          <div class="list-group-item p-3">
            <h5 class="mb-1">Feedback Form</h5>
            <small class="text-muted" data-testid="dashboard-card-feedback-desc">Subject, feedback, and rating</small>
          </div>
        </a>
        <a
          class="nav-link-card app-nav-help"
          href="help.html"
          data-testid="dashboard-nav-help"
          data-gtm-id="nav_help_center"
        >
          <div class="list-group-item p-3">
            <h5 class="mb-1">Help Center</h5>
            <small class="text-muted" data-testid="dashboard-card-help-desc">FAQs and tips for each form</small>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>

  </div>
  <script src="app.js"></script>
</body>
</html>
