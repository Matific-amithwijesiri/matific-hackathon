<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-page app-page--feedback-form" data-page="feedback-form">
  <div class="container py-5">

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="form-card bg-white p-4 app-feedback-form-card">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 id="feedbackFormTitle" class="mb-0" data-testid="feedback-form-title" data-gtm-id="feedback_form_title">Feedback Form</h3>
        <a
          href="dashboard.html"
          class="btn btn-outline-secondary app-link-back-dashboard"
          data-testid="feedback-back-dashboard"
          data-gtm-id="feedback_back_dashboard"
        >Back to Dashboard</a>
      </div>

      <form id="feedbackForm" name="feedback" class="app-form-feedback" onsubmit="submitFeedbackForm(event)">
        <div class="mb-3">
          <label for="subject" class="form-label">Subject</label>
          <input
            id="subject"
            name="subject"
            type="text"
            class="form-control app-input-feedback-subject"
            data-testid="feedback-subject"
            data-gtm-id="feedback_field_subject"
          />
        </div>
        <div class="mb-3">
          <label for="feedback" class="form-label">Feedback</label>
          <textarea
            id="feedback"
            name="feedback_body"
            class="form-control app-input-feedback-body"
            rows="4"
            data-testid="feedback-body"
            data-gtm-id="feedback_field_body"
          ></textarea>
        </div>
        <div class="mb-3">
          <label for="rating" class="form-label">Rating</label>
          <input
            id="rating"
            name="rating"
            type="range"
            class="form-range app-input-feedback-rating"
            min="1"
            max="10"
            value="5"
            data-testid="feedback-rating"
            data-gtm-id="feedback_field_rating"
          />
        </div>
        <button
          id="feedbackSubmit"
          type="submit"
          class="btn btn-warning app-btn-feedback-submit"
          data-testid="feedback-submit"
          data-gtm-id="feedback_submit"
        >Send Feedback</button>
      </form>

      <div
        id="feedbackSuccess"
        class="alert alert-success mt-3 success-message app-feedback-success"
        role="alert"
        data-testid="feedback-success"
        data-gtm-id="feedback_success_message"
      ></div>
    </div>
  </div>
</div>

  </div>
  <script src="app.js"></script>
</body>
</html>
